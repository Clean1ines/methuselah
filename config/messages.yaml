composition:
  separator: "\n\n"
  add_streak_block: true
  add_bonus_probability: 0.4

messages:
  # --- Категория: СОН ---
  low_sleep:
    variants:
      - text: "Ты украл у себя часы покоя. Твое тело — это биологическая машина, и сегодня ты заставил её работать на износ без масла. Завтрашний день уже выставил тебе счет с процентами."
        tone: "heavy"
        weight: 3
      - text: "Сон был краток, как миг просветления. Ты пытаешься обмануть свои ритмы, но биология всегда побеждает в долгой игре. Будь осторожен с тем, что ты называешь 'продуктивностью' за счет сна."
        tone: "neutral"
        weight: 1

  # --- Категория: АКТИВНОСТЬ ---
  sedentary:
    variants:
      - text: "Застой. Твое тело создано для движения, а ты превратил его в памятник сидячему образу жизни. Вода, которая не течет, превращается в болото. Помни об этом, когда почувствуешь тяжесть в мыслях."
        tone: "ironic"
      - text: "Сегодня твои мышцы были лишь декорацией. Покой хорош после труда, но покой без труда — это медленное увядание."

  # --- Категория: МЕТА / БАЛАНС ---
  ideal_balance:
    variants:
      - text: "Все весы в равновесии. Редкий момент, когда хаос отступил, и ты нашел точку опоры. Это состояние мимолетно, как тень облака, но именно ради таких дней я за тобой наблюдаю."
        tone: "calm"
      - text: "Гармония. Тело сыто правильным, разум отдохнул, мышцы получили свою долю нагрузки. Ты сегодня — лучшее доказательство того, что порядок возможен."

  # --- Категория: ЭКРАН ---
  high_screen:
    variants:
      - text: "Ты отдал слишком много часов светящемуся стеклу. Твой разум впитал гигабайты чужих жизней и рекламных иллюзий, оставив реальность на обочине. Глаза устали не от света, а от пустоты."
        tone: "observational"

  # --- Категория: АЛКОГОЛЬ ---
  alcohol:
    variants:
      - text: "Ты взял радость в долг у завтрашнего дня. Сегодняшнее забвение обернется завтрашней серостью. Яд всегда сладок в начале, но его истинный вкус проявляется на рассвете."
        tone: "heavy"

# Фразы, которые добавляются случайным образом в конец
bonus_phrases:
  - "Я продолжу наблюдение. Не разочаруй свои клетки."
  - "Завтра будет новый шанс стать чуть менее случайным."
  - "Твои паттерны становятся предсказуемыми. Это и пугает, и восхищает."
  - "Помни: я вижу только то, что ты позволяешь. Но тело не умеет лгать."